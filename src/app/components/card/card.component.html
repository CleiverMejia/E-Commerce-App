<ion-card>
  <img src="{{ image }}"/>
  <ion-card-header>
    <ion-card-title>{{ title }}</ion-card-title>
    <ion-card-subtitle>{{ category }}</ion-card-subtitle>

    <ion-card-content>
      {{ rate }} <ion-icon name="star"></ion-icon>
      <br>
      ${{ price }}
    </ion-card-content>
  </ion-card-header>
</ion-card>
